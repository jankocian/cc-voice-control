name = "voice-control"
main = "src/index.ts"
compatibility_date = "2026-06-01"

routes = [{ pattern = "voice-control.nee.rs", custom_domain = true }]

# The phone SPA is built by Vite (../web → ../web/dist) and served from here.
# run_worker_first=true makes the Worker own /s/<id> (the HTML shell + CSP) and
# /ws/<id> (the bridge); all other paths (hashed /assets/* and the build manifest)
# fall through to the static-asset handler via env.ASSETS.
[assets]
directory = "../web/dist"
binding = "ASSETS"
run_worker_first = true

[[durable_objects.bindings]]
name = "VOICE_SESSIONS"
class_name = "VoiceSessionDurableObject"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["VoiceSessionDurableObject"]

# Native Cloudflare Rate Limiting binding. Gates WS-connect attempts per client IP at the top
# of the Worker fetch (before a DO is touched) — abuse/DoS insurance, NOT the capability gate
# (a wrong secret already lands on an empty DO). Best-effort / per-edge / eventually-consistent.
# `period` must be 10 or 60; 30 connects/min is generous for the legitimate reconnect churn iOS
# Safari produces while bounding a /ws/<random> spray.
[[ratelimits]]
name = "WS_CONNECT"
namespace_id = "1001"
simple = { limit = 30, period = 60 }
