name = "voice-control"
main = "src/index.ts"
compatibility_date = "2026-06-01"

routes = [{ pattern = "voice-control.nee.rs", custom_domain = true }]

# The phone SPA is built by Vite (../web → ../web/dist) and served from here.
# run_worker_first=true makes the Worker own /s/<id> (the HTML shell + CSP) and
# /ws/<id> (the bridge); all other paths (hashed /assets/* and the build manifest)
# fall through to the static-asset handler via env.ASSETS.
[assets]
directory = "../web/dist"
binding = "ASSETS"
run_worker_first = true

[[durable_objects.bindings]]
name = "VOICE_SESSIONS"
class_name = "VoiceSessionDurableObject"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["VoiceSessionDurableObject"]

# Native Cloudflare Rate Limiting binding. Gates BOTH the WS upgrade and the POST /claim per client IP
# at the top of the Worker fetch (before a DO is touched) — abuse/DoS insurance, NOT the capability gate
# (a wrong routingId already lands on an empty DO). Best-effort / per-edge / eventually-consistent; the
# worker fails OPEN if the limiter errors. The budget is SHARED across everything behind one NAT egress
# IP: the phone now does claim + WS per (re)connect (frequent iOS background/foreground reconnects) PLUS
# every pane's daemon (each reconnects on a worker redeploy). 120/min keeps a flapping household from
# starving itself while still bounding a /ws|/claim/<random> spray. `period` must be 10 or 60.
[[ratelimits]]
name = "WS_CONNECT"
namespace_id = "1001"
simple = { limit = 120, period = 60 }
