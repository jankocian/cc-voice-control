name = "voice-control"
main = "src/index.ts"
compatibility_date = "2026-06-01"

routes = [{ pattern = "voice-control.nee.rs", custom_domain = true }]

# The phone SPA is built by Vite (../web → ../web/dist) and served from here.
# run_worker_first=true makes the Worker own /s/<id> (the HTML shell + CSP) and
# /ws/<id> (the bridge); all other paths (hashed /assets/* and the build manifest)
# fall through to the static-asset handler via env.ASSETS.
[assets]
directory = "../web/dist"
binding = "ASSETS"
run_worker_first = true

[[durable_objects.bindings]]
name = "VOICE_SESSIONS"
class_name = "VoiceSessionDurableObject"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["VoiceSessionDurableObject"]
