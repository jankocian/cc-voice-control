name: deploy-worker

# Deploys the Cloudflare bridge (worker/) on a version tag, or on demand.
# Requires repo secrets: CLOUDFLARE_API_TOKEN (Workers + Durable Objects edit) and
# CLOUDFLARE_ACCOUNT_ID. Wrangler bundles the worker from source at deploy time.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run test
      - run: bun run deploy:worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
