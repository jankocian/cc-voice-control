name: release

# Keeps the committed plugin bundle (dist/daemon/mcp-server.js) canonical and fresh.
# Marketplace installs copy the repo as-is — no install, no build — so the self-contained
# bundle must always be present and current on the installable branch. CI is the single
# source of truth for it (pinned Bun → reproducible output), so nobody builds by hand.
on:
  push:
    branches: [main, master]

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  bundle:
    runs-on: ubuntu-latest
    # Skip the bot's own bundle commit to avoid an infinite loop.
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run typecheck
      - run: bun run test
      - run: bun run build
      - name: Commit rebuilt bundle if it changed
        run: |
          if [ -n "$(git status --porcelain dist)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add dist
            git commit -m "chore: rebuild plugin bundle [skip ci]"
            git push
          fi
